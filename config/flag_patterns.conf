# StegoForge Flag Patterns
# First match wins — order by specificity (most specific first)

# Well-known platforms
picoCTF\{[^}\r\n]{1,200}\}
HTB\{[^}\r\n]{1,200}\}
THM\{[^}\r\n]{1,200}\}
NCSE\{[^}\r\n]{1,200}\}

# Generic
FLAG\{[^}\r\n]{1,200}\}
flag\{[^}\r\n]{1,200}\}
CTF\{[^}\r\n]{1,200}\}

# Generic AnyName{...} — scored by confidence system
[A-Za-z0-9_]+\{[^}\r\n]{1,200}\}
