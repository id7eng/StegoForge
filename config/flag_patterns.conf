# StegoForge Flag Patterns
# First match wins — order by specificity (most specific first)

# Well-known platforms
picoCTF\{[^}\r\n]{1,200}\}
HTB\{[^}\r\n]{1,200}\}
THM\{[^}\r\n]{1,200}\}
NCSE\{[^}\r\n]{1,200}\}

# Generic
FLAG\{[^}\r\n]{1,200}\}
flag\{[^}\r\n]{1,200}\}
CTF\{[^}\r\n]{1,200}\}

# Fallback (unknown competitions)
\b[A-Za-z][A-Za-z0-9_]{2,20}\{[^}\r\n]{1,200}\}
